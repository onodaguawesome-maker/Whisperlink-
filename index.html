<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhisperLink - Create Link</title>
  <style>
    body { font-family: system-ui; background: #0a0a0f; color: #e9e9f0; max-width: 600px; margin: 40px auto; padding: 20px; }
    input, textarea, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: #1a1a2e; color: #fff; box-sizing: border-box; }
    button { background: #8b5cf6; border: none; cursor: pointer; font-weight: 600; }
  .card { background: rgba(20,20,35,0.6); padding: 24px; border-radius: 12px; }
  .warn { color: #fbbf24; font-size: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Create Anonymous Link</h1>
    <input id="token" type="password" placeholder="Bot Token from @BotFather">
    <input id="chatId" placeholder="Your Chat ID from @userinfobot">
    <div class="warn">Start your bot first, then send /start to it</div>
    <input id="name" placeholder="Your Display Name">
    <textarea id="topic" placeholder="Topic: Ask me anything..."></textarea>
    <button onclick="createLink()">Generate Link</button>
    <div id="result" style="display:none; margin-top:20px;">
      <p>Your link:</p>
      <div id="linkOut" style="word-break:break-all; background:#000; padding:10px; border-radius:6px;"></div>
      <button onclick="navigator.clipboard.writeText(linkOut.textContent)" style="margin-top:10px;">Copy</button>
    </div>
  </div>

  <script>
    async function createLink() {
      const token = document.getElementById('token').value.trim();
      const chatId = document.getElementById('chatId').value.trim();
      const name = document.getElementById('name').value.trim();
      const topic = document.getElementById('topic').value.trim();
      if(!token||!chatId||!name||!topic) return alert('Fill all fields');
      const linkId = Math.random().toString(36).substring(2, 10);
      const res = await fetch('/.netlify/functions/create-link', {
        method: 'POST', body: JSON.stringify({ linkId, token, chatId, name, topic })
      });
      if(res.ok) {
        document.getElementById('linkOut').textContent = `${location.origin}/t/${linkId}`;
        document.getElementById('result').style.display = 'block';
      } else alert('Error. Check bot token.');
    }
  </script>
</body>
</html>
